services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        APP_NAME: "@stixmagic/api"
    env_file:
      - ../../.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - minio

  bot:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        APP_NAME: "@stixmagic/bot"
    env_file:
      - ../../.env
    ports:
      - "4100:4100"
    depends_on:
      - api
      - trigger-engine

  sticker-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        APP_NAME: "@stixmagic/sticker-engine"
    env_file:
      - ../../.env
    ports:
      - "4200:4200"
    depends_on:
      - minio

  trigger-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        APP_NAME: "@stixmagic/trigger-engine"
    env_file:
      - ../../.env
    ports:
      - "4300:4300"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stixmagic
      POSTGRES_USER: stixmagic
      POSTGRES_PASSWORD: stixmagic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
