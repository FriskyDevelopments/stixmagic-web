name: Deploy Web to Vercel (Dev / Preview)

on:
  push:
    branches: [preview, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to dev/preview'
        required: true
        default: 'preview'

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web app
        env:
          NEXT_PUBLIC_STIXMAGIC_MANIFEST_URL: ${{ vars.STIXMAGIC_MANIFEST_URL_DEV || vars.STIXMAGIC_MANIFEST_URL || 'https://preview.stixmagic.com/manifest.json' }}
          NEXT_PUBLIC_STIXMAGIC_API_BASE_URL: ${{ vars.STIXMAGIC_API_BASE_URL_DEV || vars.STIXMAGIC_API_BASE_URL || 'https://preview.stixmagic.com' }}
          NEXT_PUBLIC_STIXMAGIC_PUBLIC_WEB_URL: ${{ vars.STIXMAGIC_PUBLIC_WEB_URL_DEV || vars.STIXMAGIC_PUBLIC_WEB_URL || 'https://preview.stixmagic.com' }}
          NEXT_PUBLIC_STIXMAGIC_BOT_USERNAME: ${{ vars.STIXMAGIC_BOT_USERNAME || 'StixMagicBot' }}
          NEXT_PUBLIC_STIXMAGIC_MINI_APP_URL: ${{ vars.STIXMAGIC_MINI_APP_URL_DEV || vars.STIXMAGIC_MINI_APP_URL || 'https://preview.stixmagic.com/dashboard' }}
        run: pnpm --filter @stixmagic/web build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: apps/web/out
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Preview)
    needs: build
    runs-on: ubuntu-latest
    # Skip deploy for PRs from forks — secrets are not available there
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: apps/web/out

      - name: Install Vercel CLI
        run: pnpm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview
        working-directory: apps/web

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: apps/web
