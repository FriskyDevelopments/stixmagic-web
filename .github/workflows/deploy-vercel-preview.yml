name: Deploy web/dist to Vercel (Dev / Preview)

on:
  push:
    branches: [preview, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to dev/preview'
        required: true
        default: 'preview'

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: vercel-apps-web-preview-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web app
        run: npm run build -w web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Preview)
    needs: build
    runs-on: ubuntu-latest
    # Skip deploy for PRs from forks — secrets are not available there
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(npx vercel --yes web/dist 2>&1 | grep -E '^https://' | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
