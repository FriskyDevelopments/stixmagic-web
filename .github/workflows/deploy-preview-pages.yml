name: Deploy Preview Web (External Pages Repo)

on:
  push:
    branches: [preview]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to preview'
        required: true
        default: 'preview'

permissions:
  contents: read

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web app
        run: npm run build -w web

      - name: Publish to preview Pages repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PREVIEW_REPO_TOKEN }}
          external_repository: ${{ vars.PREVIEW_PAGES_REPO || format('{0}/stixmagic-web-preview', github.repository_owner) }}
          publish_branch: gh-pages
          publish_dir: web/dist
          cname: ${{ vars.PAGES_PREVIEW_DOMAIN || 'preview.stixmagic.com' }}
          force_orphan: true