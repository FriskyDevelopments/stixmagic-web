name: Deploy Preview Web (External Pages Repo)

on:
  push:
    branches: [preview]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to preview'
        required: true
        default: 'preview'

permissions:
  contents: read

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web app
        env:
          GITHUB_PAGES: 'true'
          CUSTOM_DOMAIN: ${{ vars.PAGES_PREVIEW_DOMAIN || 'preview.stixmagic.com' }}
          NEXT_PUBLIC_STIXMAGIC_USE_DEMO_DATA: ${{ vars.STIXMAGIC_USE_DEMO_DATA_PREVIEW || 'true' }}
          NEXT_PUBLIC_STIXMAGIC_ALLOW_API_FALLBACK: ${{ vars.STIXMAGIC_ALLOW_API_FALLBACK_PREVIEW || 'true' }}
        run: pnpm --filter @stixmagic/web build

      - name: Publish to preview Pages repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PREVIEW_REPO_TOKEN }}
          external_repository: ${{ vars.PREVIEW_PAGES_REPO || format('{0}/stixmagic-web-preview', github.repository_owner) }}
          publish_branch: gh-pages
          publish_dir: apps/web/out
          cname: ${{ vars.PAGES_PREVIEW_DOMAIN || 'preview.stixmagic.com' }}
          force_orphan: true
