name: Deploy web/dist to Vercel (Preview) — Pages

on:
  push:
    branches: [preview]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to preview'
        required: true
        default: 'preview'

permissions:
  contents: read

concurrency:
  group: vercel-preview-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web app
        run: npm run build -w web

      - name: Deploy to Vercel (preview)
        run: npx vercel --yes web/dist