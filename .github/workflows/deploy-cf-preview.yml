name: Deploy web/dist to Cloudflare Pages (Dev / Preview)

on:
  push:
    branches: [preview, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to deploy to dev/preview'
        required: true
        default: 'preview'

permissions:
  contents: read
  deployments: write
  statuses: write
  pull-requests: write

concurrency:
  group: cf-pages-preview-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web app
        run: npm run build -w web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    # Skip deploy for PRs from forks — secrets are not available there
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CF_PAGES_PROJECT_NAME || 'stixmagic-web' }}
          directory: web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
