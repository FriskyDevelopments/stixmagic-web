name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Configure custom domain (optional)
        env:
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > apps/web/public/CNAME
          fi

      - name: Build static web app or redirect page
        env:
          GITHUB_PAGES: 'true'
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
          REDIRECT_TARGET: ${{ vars.PAGES_REDIRECT_TARGET }}
        run: |
          if [ -n "$REDIRECT_TARGET" ]; then
            node scripts/build-redirect.js "$REDIRECT_TARGET" apps/web/out
          else
            pnpm --filter @stixmagic/web build
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
